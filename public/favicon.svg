<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffb347" />
      <stop offset="100%" stop-color="#ff7b00" />
    </linearGradient>
    
    <!-- Red Box Gradient -->
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
    
    <!-- Blue Tarp Gradient -->
    <linearGradient id="tarpGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>

  <!-- Circular Base -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" />

  <!-- Red Delivery Box -->
  <rect x="25" y="40" width="50" height="40" rx="4" fill="url(#boxGrad)"/>

  <!-- Straps Vertical -->
  <rect x="35" y="40" width="6" height="40" fill="#1e3a8a"/>
  <rect x="59" y="40" width="6" height="40" fill="#1e3a8a"/>

  <!-- Strap Horizontal -->
  <rect x="25" y="58" width="50" height="6" fill="#1e3a8a"/>

  <!-- Blue Tarp / Cover Top -->
  <path d="M 21 35 L 79 35 C 80 44, 75 44, 50 44 C 25 44, 20 44, 21 35 Z" fill="url(#tarpGrad)"/>
  
  <!-- Tarp Top Lip -->
  <rect x="21" y="32" width="58" height="6" rx="2" fill="#2563eb"/>

  <!-- Golden Smoke -->
  <circle cx="50" cy="20" r="10" fill="#facc15" opacity="0.9"/>
  <circle cx="38" cy="25" r="7" fill="#facc15" opacity="0.8"/>
  <circle cx="62" cy="22" r="8" fill="#facc15" opacity="0.8"/>
  <circle cx="54" cy="28" r="6" fill="#facc15" opacity="0.6"/>
  <circle cx="45" cy="12" r="6" fill="#facc15" opacity="0.5"/>
</svg>
